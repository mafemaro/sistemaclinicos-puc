<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Administrador</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- para entrar como administrador, use o email: admin@puc.br, senha: 123 -->

    <div class="container">
        <header class="cabecalho">
            <div class="logo">⚕️ Admin Geral</div>
            <div class="perfil-usuario" onclick="sair()">
                <strong id="nome-usuario"></strong>
                <div class="avatar" id="avatar-letra"></div>
            </div>
        </header>

        <div class="cards">
            <div class="card">
                <h4>Consultas Hoje</h4>
                <div class="valor" id="total-consultas">0</div>
            </div>
            <div class="card">
                <h4>Aguardando</h4>
                <div class="valor" id="total-aguardando">0</div>
            </div>
            <div class="card">
                <h4>Presentes</h4>
                <div class="valor" id="total-presentes">0</div>
            </div>
        </div>

        <div class="tabela-container">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <h3>Relatório de Atendimentos</h3>
                <button class="btn btn-vazado" onclick="simularExportacao()">Exportar PDF</button>
            </div>
            
            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Horário</th>
                        <th>Paciente</th>
                        <th>Profissional</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="tabela-admin"></tbody>
            </table>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
        // carrega painel admin
        function carregarPainel() {
            carregarCabecalho();
            
            const stringConsultas = localStorage.getItem('consultas') || '[]';
            const consultas = JSON.parse(stringConsultas);
            
            document.getElementById('total-consultas').innerText = consultas.length;
            
            const aguardando = consultas.filter((c) => {
                return c.status === 'aguardando';
            });
            document.getElementById('total-aguardando').innerText = aguardando.length;
            
            const presentes = consultas.filter((c) => {
                return c.status === 'presente';
            });
            document.getElementById('total-presentes').innerText = presentes.length;

            const tbody = document.getElementById('tabela-admin');
            tbody.innerHTML = '';
            
            consultas.forEach((c) => {
                tbody.innerHTML += `
                    <tr>
                        <td>${c.data}</td>
                        <td>${c.horario}</td>
                        <td>${c.paciente}</td>
                        <td>${c.profissional}</td>
                        <td><span class="status ${c.status}">${c.status.toUpperCase()}</span></td>
                    </tr>
                `;
            });
        }

        // simula exportacao relatorio
        function simularExportacao() {
            mostrarToast("Gerando relatório em PDF... Download concluído.", "sucesso");
        }

        document.addEventListener('DOMContentLoaded', carregarPainel);
    </script>
</body>
</html>
